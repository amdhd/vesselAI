version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vesselmind-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vesselmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vesselmind_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vesselmind}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vesselmind}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vesselmind-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vesselmind}:${POSTGRES_PASSWORD:-vesselmind_secret}@postgres:5432/${POSTGRES_DB:-vesselmind}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vesselmind-web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
