# Serves the built SPA and reverse-proxies the API + websockets to the backend,
# so the browser talks to a single origin (no CORS). Runs under the
# nginx-unprivileged image (non-root, port 8080).
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  # Fingerprinted build assets — safe to cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # REST API.
  location /api/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE (the agent's streaming reasoning trace) must not be buffered.
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # Socket.io realtime channel.
  location /socket.io/ {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # SPA fallback — client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
