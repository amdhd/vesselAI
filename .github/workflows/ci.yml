name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token: this pipeline only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      # Ephemeral Postgres used to prove the migration chain applies cleanly.
      # The test step deliberately runs WITHOUT DATABASE_URL (see below), so the
      # service does not need to persist anything between steps.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vesselmind
          POSTGRES_PASSWORD: vesselmind_secret
          POSTGRES_DB: vesselmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vesselmind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (validate the migration chain on fresh Postgres)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://vesselmind:vesselmind_secret@localhost:5432/vesselmind_test

      - name: Typecheck
        run: npx tsc --noEmit

      # NOTE: no DATABASE_URL here on purpose. The integration suite exercises
      # the app's DB-unreachable graceful-degradation paths (503 / demo-cred
      # fallback), which require Prisma to have no reachable DB. Pointing these
      # tests at the Postgres service above would flip those assertions.
      - name: Test
        run: npm test

  frontend:
    name: Frontend — typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck + build
        run: npm run build
