name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token: this pipeline only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  frontend:
    name: Frontend — typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck + build
        run: npm run build
