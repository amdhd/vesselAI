version: 2

models:
  - name: dim_vessel
    description: >
      Vessel dimension — one row per vessel (MMSI) with its most recent known
      attributes and a decoded vessel-type label. The "who" that facts join to.
    columns:
      - name: mmsi
        description: "Vessel identifier and primary key — exactly one row per vessel."
        tests:
          - not_null
          - unique       # proves the dimension grain: one row per vessel
      - name: vessel_type_desc
        description: "Human-readable vessel category decoded from the AIS type code."
        tests:
          - not_null

  - name: fct_vessel_daily
    description: >
      Daily activity fact — one row per vessel per day with ping count, average
      and max speed, estimated distance travelled, and first/last position.
    columns:
      - name: mmsi
        description: "Vessel identifier — foreign key to dim_vessel."
        tests:
          - not_null
          - relationships:                 # referential integrity: every fact vessel exists in the dim
              arguments:
                to: ref('dim_vessel')
                field: mmsi
      - name: activity_date
        description: "Calendar day of activity (part of the grain)."
        tests:
          - not_null
      - name: ping_count
        description: "Number of position reports that day (always at least 1)."
        tests:
          - not_null
          - between:
              arguments:
                min_value: 1
                max_value: 1000000

  - name: gold_vessel_idling
    description: >
      One row per idle episode (a run of near-zero-speed pings lasting at least
      the configured minimum), longest first. Answers "which vessels idled, where,
      and for how long".
    columns:
      - name: mmsi
        description: "Vessel that was idling — foreign key to dim_vessel."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_vessel')
                field: mmsi
      - name: idle_minutes
        description: "Length of the idle episode in minutes (>= configured minimum)."
        tests:
          - not_null
          - between:
              arguments:
                min_value: 30           # matches default idle_min_minutes
                max_value: 100000
